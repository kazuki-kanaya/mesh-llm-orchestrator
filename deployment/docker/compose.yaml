x-quegress-image: &quegress-image
  image: quegress:dev
  build:
    context: ../..
    dockerfile: Dockerfile

services:
  redis:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  httpbin:
    image: mccutchen/go-httpbin:2.22.1
    ports:
      - "127.0.0.1:9000:8080"

  jobstate:
    <<: *quegress-image
    command: ["/usr/local/bin/jobstate"]
    environment:
      REDIS_ADDR: redis:6379
      JOBSTATE_GRPC_ADDR: :50051
    depends_on:
      - redis

  requestapi:
    <<: *quegress-image
    command: ["/usr/local/bin/requestapi"]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      REDIS_ADDR: redis:6379
      JOBSTATE_GRPC_ADDR: jobstate:50051
      REQUESTAPI_ADDR: :8080
      REQUESTAPI_WAIT_TIMEOUT: 120s
      TARGET_BASE_URL: http://httpbin:8080
    depends_on:
      - redis
      - jobstate

  executor:
    <<: *quegress-image
    command: ["/usr/local/bin/executor"]
    environment:
      REDIS_ADDR: redis:6379
      JOBSTATE_GRPC_ADDR: jobstate:50051
      EXECUTOR_CONSUMER_NAME: executor-1
      EXECUTOR_RETRY_BACKOFF: 1s
      EXECUTOR_REQUEST_TIMEOUT: 30s
      EXECUTOR_MAX_RESPONSE_BYTES: 10485760
    depends_on:
      - redis
      - jobstate
      - httpbin

  reconciler:
    <<: *quegress-image
    command: ["/usr/local/bin/reconciler"]
    environment:
      REDIS_ADDR: redis:6379
      JOBSTATE_GRPC_ADDR: jobstate:50051
      RECONCILER_CONSUMER_NAME: reconciler-1
      RECONCILER_STALE_AFTER: 45s
      RECONCILER_BATCH_SIZE: 100
      RECONCILER_INTERVAL: 5s
    depends_on:
      - redis
      - jobstate

volumes:
  redis_data:
