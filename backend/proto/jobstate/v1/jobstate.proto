syntax = "proto3";

package jobstate.v1;

option go_package = "github.com/kazuki-kanaya/mesh-llm-orchestrator/backend/gen/jobstate/v1;jobstatev1";

import "google/protobuf/timestamp.proto";

service JobStateService {
  rpc CreateAndEnqueue(CreateAndEnqueueRequest) returns (CreateAndEnqueueResponse);
  rpc StartAttempt(StartAttemptRequest) returns (StartAttemptResponse);
  rpc CompleteAttempt(CompleteAttemptRequest) returns (CompleteAttemptResponse);
  rpc FailAttempt(FailAttemptRequest) returns (FailAttemptResponse);
  rpc RecoverStaleAndEnqueue(RecoverStaleAndEnqueueRequest) returns (RecoverStaleAndEnqueueResponse);
  rpc Get(GetRequest) returns (GetResponse);
}

message HeaderValues {
  repeated string values = 1;
}

message HTTPRequest {
  string method = 1;
  string url = 2;
  string host = 3;
  map<string, HeaderValues> headers = 4;
  bytes body = 5;
}

message HTTPResponse {
  int32 status_code = 1;
  map<string, HeaderValues> headers = 2;
  bytes body = 3;
}

message Job {
  string id = 1;
  string status = 2;
  HTTPRequest request = 3;
  optional HTTPResponse response = 4;
  google.protobuf.Timestamp created_at = 5;
  optional google.protobuf.Timestamp started_at = 6;
  optional google.protobuf.Timestamp terminated_at = 7;
  int64 current_attempt = 8;
}

message CreateAndEnqueueRequest {
  HTTPRequest request = 1;
}

message CreateAndEnqueueResponse {
  string job_id = 1;
}

message StartAttemptRequest {
  string job_id = 1;
}

message StartAttemptResponse {
  bool accepted = 1;
  int64 attempt = 2;
}

message CompleteAttemptRequest {
  string job_id = 1;
  int64 attempt = 2;
  HTTPResponse response = 3;
}

message CompleteAttemptResponse {
  bool accepted = 1;
}

message FailAttemptRequest {
  string job_id = 1;
  int64 attempt = 2;
}

message FailAttemptResponse {
  bool accepted = 1;
}

message RecoverStaleAndEnqueueRequest {
  string job_id = 1;
  google.protobuf.Timestamp cutoff = 2;
}

message RecoverStaleAndEnqueueResponse {
  bool recovered = 1;
  bool terminal = 2;
  bool already_queued = 3;
}

message GetRequest {
  string job_id = 1;
}

message GetResponse {
  Job job = 1;
}
